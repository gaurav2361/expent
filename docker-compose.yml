services:
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Inject API base URL pointing to the local proxy/port
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:7878}
    env_file:
      - .env
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "7878:7878"
    environment:
      # Automatically wire OCR worker in docker network
      - OCR_WORKER_URL=http://ocr:8090/ocr
      - RUST_LOG=info
    env_file:
      - .env
    depends_on:
      - ocr

  ocr:
    build:
      context: .
      dockerfile: apps/ocr/Dockerfile
    ports:
      - "8090:8090"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
